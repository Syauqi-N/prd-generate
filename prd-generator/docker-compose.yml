services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prd-generator-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-prdgen_soqi_2026}@postgres:5432/prd_generator
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prd-network

  postgres:
    image: postgres:16-alpine
    container_name: prd-generator-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-prdgen_soqi_2026}
      - POSTGRES_DB=prd_generator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prd-network
    ports:
      - "5433:5432"

volumes:
  postgres_data:

networks:
  prd-network:
    driver: bridge
